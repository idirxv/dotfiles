devices: (
  {
    name: "MX Master 3S";
    dpi: 1000;

    // SmartShift (Freespin wheel behavior)
    smartshift:
    {
        on: true;
        // Freespin trigger sensitivity
        // Possible values: 1 to 255 (Lower triggers faster. Recommended: 15 to 30)
        threshold: 15; 
    };

    // High-resolution scrolling (Smooth scrolling)
    hiresscroll:
    {
        hires: true;
        invert: false;
        target: false;
    };

    // Button remapping
    buttons: (
      {
        // Back button
        cid: 0x53;
        action =
        {
          type: "Keypress";
          keys: ["KEY_LEFTCTRL", "KEY_C"];
        };
      },
      {
        // Forward button
        cid: 0x56;
        action =
        {
          type: "Keypress";
          keys: ["KEY_LEFTCTRL", "KEY_V"];
        };
      }
    );
  },
  {
    // Declared here for potential future configurations.
    name: "MX Keys Wireless Keyboard";
  }
);

